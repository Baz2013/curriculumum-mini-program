version: '3.8'

services:
  course-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-reservation-api
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # 持久化数据库文件
      - ./data:/app/data
      # 日志挂载
      - ./logs:/app/logs
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - course-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  course-network:
    driver: bridge

volumes:
  data:
  logs: